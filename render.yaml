services:
  - type: web
    name: northstar-stock-intelligence
    runtime: node
    plan: free
    buildCommand: npm install && npm run check
    startCommand: npm run serve
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.3.0
      - key: NODE_ENV
        value: production
      - key: SEC_USER_AGENT
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NORTHSTAR_INVITE_CODE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: northstar-stock-intelligence-db
          property: connectionString

databases:
  - name: northstar-stock-intelligence-db
    databaseName: northstar
    user: northstar
